---
apiVersion: v1
kind: Secret
metadata:
  name: trading-secrets
  namespace: trading-system
type: Opaque
stringData:
  # IMPORTANT: Replace these with actual values before deploying
  # In production, use a secrets manager like AWS Secrets Manager, Vault, or Sealed Secrets

  # Flask API
  api-key: "change-this-to-a-random-api-key"
  secret-key: "change-this-to-a-random-secret-key-in-production"

  # External API keys
  alpha-vantage-key: "your-alpha-vantage-api-key"

  # Airflow credentials
  airflow-admin-user: "admin"
  airflow-admin-password: "change-this-password"

  # Airflow Fernet key (generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
  airflow-fernet-key: "change-this-to-a-fernet-key"

  # PostgreSQL credentials (Airflow metadata DB)
  postgres-password: "change-this-password"

  # Airflow metadata DB connection string (references airflow-postgres service)
  airflow-db-conn: "postgresql+psycopg2://airflow:change-this-password@airflow-postgres.trading-system:5432/airflow"

  # PostgreSQL credentials (Time series data DB)
  timeseries-postgres-password: "change-this-timeseries-password"
  timeseries-postgres-user: "trading"
  timeseries-postgres-db: "trading_data"

  # Optional: External services
  # slack-webhook-url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  # email-username: "alerts@yourcompany.com"
  # email-password: "your-email-password"

---
# Note: For production, create secrets using kubectl:
# kubectl create secret generic trading-api-secrets \
#   --from-literal=SECRET_KEY='your-secret-key' \
#   --from-literal=API_KEYS='key1,key2,key3' \
#   --namespace=trading-system
