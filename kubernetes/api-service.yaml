apiVersion: v1
kind: Service
metadata:
  name: trading-api-service
  namespace: trading-system
  labels:
    app: trading-api
spec:
  selector:
    app: trading-api
  ports:
  - name: http
    protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30427
  type: NodePort
  sessionAffinity: None
