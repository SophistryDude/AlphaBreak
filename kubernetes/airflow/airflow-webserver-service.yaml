apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: trading-system
  labels:
    app: airflow-webserver
spec:
  selector:
    app: airflow-webserver
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
  type: LoadBalancer  # Change to ClusterIP if using Ingress
